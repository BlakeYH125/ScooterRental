version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scooter_rental_db
    restart: always
    environment:
      POSTGRES_DB: scooter_rental_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 15492815
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build: .
    container_name: scooter_rental_app
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/scooter_rental_db
volumes:
  postgres_data:


